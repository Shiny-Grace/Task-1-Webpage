<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ByteBites</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header>
    <h1>🍔 ByteBites</h1>

    <nav>
        <a href="#">Home</a>
        <a href="#">Menu</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <div class="cart-icon">
        🛒 <span id="cartCount">0</span>
    </div>
</header>

<section class="hero">

<h2>Fresh Food, Fast Delivery</h2>

<p>Delicious meals made with love.</p>

<button onclick="welcome()">Explore Menu</button>

</section>

<section class="menu">

<h2>Our Popular Menu</h2>

<input
type="text"
id="search"
placeholder="🔍 Search your favourite food..."
>

<div class="filter-buttons">

<button onclick="filterMenu('all')">All</button>

<button onclick="filterMenu('pizza')">Pizza</button>

<button onclick="filterMenu('burger')">Burger</button>

<button onclick="filterMenu('fries')">Fries</button>

<button onclick="filterMenu('drink')">Drinks</button>

</div>

<p id="noResult">No food found 🍔</p>

<div class="cards">

<div class="card pizza" data-name="Pizza" data-price="299">

<i class="fa-solid fa-heart favourite"></i>

<img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500">

<h3>Pizza</h3>

<p>₹299</p>

<button onclick="addToCart('Pizza',299)">Add to Cart</button>

</div>

<div class="card burger" data-name="Burger" data-price="199">

<i class="fa-solid fa-heart favourite"></i>

<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500">

<h3>Burger</h3>

<p>₹199</p>

<button onclick="addToCart('Burger',199)">Add to Cart</button>

</div>

<div class="card fries" data-name="French Fries" data-price="149">

<i class="fa-solid fa-heart favourite"></i>

<img src="https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=500">

<h3>French Fries</h3>

<p>₹149</p>

<button onclick="addToCart('French Fries',149)">Add to Cart</button>

</div>

<div class="card drink" data-name="Cold Drink" data-price="99">

<i class="fa-solid fa-heart favourite"></i>

<img src="https://images.unsplash.com/photo-1544145945-f90425340c7e?w=500">

<h3>Cold Drink</h3>

<p>₹99</p>

<button onclick="addToCart('Cold Drink',99)">Add to Cart</button>

</div>

</div>

</section>

<section class="cart">

<h2>🛒 Shopping Cart</h2>

<ul id="cartItems"></ul>

<h3>Total: ₹<span id="total">0</span></h3>

<button onclick="clearCart()">Clear Cart</button>

</section>

<section class="contact">

<h2>Contact Us</h2>

<input type="text" placeholder="Your Name">

<input type="email" placeholder="Your Email">

<textarea placeholder="Message"></textarea>

<br>

<button>Send</button>

</section>

<footer>

<p>© 2026 ByteBites | Made with ❤️ by Shiny</p>

</footer>

<script src="script.js"></script>

</body>
</html>
